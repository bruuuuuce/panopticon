<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panopticon — Monitor</title>
    <script src="/js/theme.js"></script>
    <link rel="icon" type="image/png" href="/images/panopticon_icon_transparent_128.png">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="monitor">
<div class="monitor-bar">
    <div class="brand">
        <img class="brand-logo" src="/images/panopticon_icon_transparent_128.png" alt="Panopticon">
        <span class="brand-title">Panopticon</span>
    </div>
    <div class="monitor-dashboard-info">
        <span class="dash-title" id="current-dashboard-title">Loading&hellip;</span>
        <span class="dash-position" id="dashboard-position"></span>
    </div>
    <div class="spacer"></div>
    <div class="countdown" id="countdown"></div>
    <div class="monitor-controls">
        <button id="btn-prev" title="Previous dashboard (&larr;)">&#8249; Prev</button>
        <button id="btn-pause" title="Pause rotation (space)">Pause</button>
        <button id="btn-next" title="Next dashboard (&rarr;)">Next &#8250;</button>
        <button id="btn-fullscreen" title="Toggle fullscreen (f)">Fullscreen</button>
        <button class="theme-toggle" type="button">Theme: auto</button>
        <a class="nav-link" href="/index.html">Exit</a>
    </div>
</div>
<div class="monitor-progress"><div class="monitor-progress-bar" id="progress-bar"></div></div>

<div class="monitor-body">
    <div class="panel-grid" id="panel-grid"></div>
</div>

<script src="/js/vendor/echarts.min.js"></script>
<script type="module" src="/js/monitor.js"></script>
</body>
</html>
